version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: search-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: search_user
      POSTGRES_PASSWORD: search_pass
      POSTGRES_DB: search_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search_user -d search_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: search-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://search_user:search_pass@postgres:5432/search_db
      UPLOAD_DIR: /app/uploads
      FAISS_INDEX_DIR: /app/faiss_index
      TEXT_MODEL: all-MiniLM-L6-v2
      CLIP_MODEL: openai/clip-vit-base-patch32
      WHISPER_MODEL: base
      PROMETHEUS_ENABLED: "true"
      DEBUG: "false"
    volumes:
      - uploads_data:/app/uploads
      - faiss_data:/app/faiss_index
      - ./frontend:/app/frontend:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: search-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ─── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: search-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ─── Grafana ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: search-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  uploads_data:
  faiss_data:
  prometheus_data:
  grafana_data:
